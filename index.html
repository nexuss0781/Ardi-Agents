<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Assistant</title>
    
    <!-- Aggressive Caching Headers Simulation (Meta Tags) -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public, immutable">
    <meta http-equiv="Expires" content="Thu, 31 Dec 2099 20:00:00 GMT">
    <meta http-equiv="Pragma" content="cache">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS for Modern Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        dark: '#0f172a',
                        panel: '#1e293b'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        .tool-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid #3b82f6;
            color: #60a5fa;
        }
        
        .message-user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .message-ai {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .code-block {
            font-family: 'Fira Code', monospace;
            background: #0f172a;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        /* Line numbers styling */
        .line-numbers {
            display: inline-block;
            text-align: right;
            color: #64748b;
            margin-right: 1rem;
            user-select: none;
            border-right: 1px solid #334155;
            padding-right: 0.5rem;
        }
    </style>
</head>
<body class="bg-dark text-slate-200 h-screen flex overflow-hidden font-sans antialiased selection:bg-primary selection:text-white">

    <!-- Sidebar: Tools Navigation -->
    <aside class="w-72 bg-panel flex flex-col border-r border-slate-800 shadow-2xl z-20 transition-all duration-300" id="sidebar">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <i data-lucide="cpu" class="w-5 h-5"></i>
            </div>
            <h1 class="font-bold text-lg tracking-wide text-white">Nexus Tools</h1>
        </div>

        <div class="flex-1 overflow-y-auto py-4 space-y-6" id="tools-container">
            <!-- Tools will be injected here by TypeScript -->
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-900/50">
            <div class="flex items-center gap-3 text-xs text-slate-500">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span>System Online • v2.0</span>
            </div>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative min-w-0">
        <!-- Header -->
        <header class="h-16 border-b border-slate-800 bg-panel/80 backdrop-blur-md flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-4">
                <button id="toggle-sidebar" class="p-2 hover:bg-slate-800 rounded-lg transition-colors text-slate-400 hover:text-white">
                    <i data-lucide="panel-left" class="w-5 h-5"></i>
                </button>
                <h2 class="font-semibold text-slate-200" id="current-tool-name">General Chat</h2>
            </div>
            <div class="flex items-center gap-3">
                <button class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors" title="Clear Chat">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <button class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors" title="Settings">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Messages Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth">
            <!-- Welcome Message -->
            <div class="flex gap-4 max-w-4xl mx-auto animate-slide-up">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shrink-0 shadow-lg">
                    <i data-lucide="bot" class="w-6 h-6 text-white"></i>
                </div>
                <div class="space-y-2">
                    <div class="font-semibold text-sm text-slate-400">Assistant</div>
                    <div class="bg-panel border border-slate-800 p-4 rounded-2xl rounded-tl-none shadow-md text-slate-300 leading-relaxed">
                        Hello! I'm ready to help. Select a tool from the sidebar to get started, or ask me anything directly.
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 pt-2 bg-gradient-to-t from-dark via-dark to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-secondary rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                <div class="relative flex items-end gap-2 bg-panel border border-slate-700 rounded-xl p-2 shadow-2xl">
                    <button class="p-3 text-slate-400 hover:text-primary hover:bg-slate-800 rounded-lg transition-all">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        class="w-full bg-transparent text-slate-200 placeholder-slate-500 border-0 focus:ring-0 resize-none py-3 max-h-32"
                        placeholder="Type your message or command..."
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="send-btn" class="p-3 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105 active:scale-95">
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="text-center mt-2 text-xs text-slate-600">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons on load
        lucide.createIcons();
    </script>
</body>
</html>
